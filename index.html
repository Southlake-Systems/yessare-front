<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yessare Tools — Coming Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    .logo {
      width: 140px;
      margin-bottom: 20px;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .highlight {
      color: #38bdf8;
    }

    .email-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      outline: none;
      width: 250px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Replace with your logo file -->
    <img src="image.png" alt="Yessare Logo" class="logo" />

    <h1>Yessare Tools</h1>
    <p>
      Kerala's 1st Tools Supermarket <span class="highlight">coming soon</span> 
    </p>

    <div class="email-box">
      <input type="email" placeholder="Enter your email" />
      <button>Notify Me</button>
    </div>

    <div class="footer">
      © 2026 Yessare Tools
    </div>

  </div>

</body>
</html>
